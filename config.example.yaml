generation:
  agent: codex
  prompt_file: prompts/daily_report.md
  timeout_seconds: 3600
  agents:
    claude:
      base_url: ""
      api_key: ""
      model: ""
      command_template:
        - claude
        - --print
        - "{prompt}"
        - --dangerously-skip-permissions
    codex:
      base_url: ""
      api_key: ""
      model: ""
      command_template:
        - codex
        - exec
        - --dangerously-bypass-approvals-and-sandbox
        - "{prompt}"

publish:
  site_base_url: "http://localhost:8000"
  runs_dir: runs
  public_dir: public
  reports_path: /reports

dingtalk:
  webhook: ""
  secret: ""

web:
  admin:
    username: admin
    password: change-me
    session_secret: change-me-session-secret
  run_command:
    - python
    - -m
    - daily_vulns_agent.cli
    - --config
    - "{config_path}"
    - run

schedule:
  enabled: true
  timezone: Asia/Shanghai
  times:
    - "09:00"
