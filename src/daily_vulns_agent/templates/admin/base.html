<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Daily Vulns Admin" }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #172033;
      --muted: #667085;
      --border: #e4e7ec;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger-bg: #fef2f2;
      --danger: #b42318;
      --success-bg: #ecfdf3;
      --success: #027a48;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-weight: 800;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
      backdrop-filter: blur(12px);
    }

    nav a {
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    nav a:hover {
      background: var(--panel-soft);
      color: var(--text);
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .stat {
      padding: 18px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .stat-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      overflow-wrap: anywhere;
      font-size: 16px;
      font-weight: 700;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      color: #344054;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
      transform: translateY(1px);
    }

    button {
      margin-top: 22px;
      padding: 11px 18px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
    }

    button:hover { background: var(--primary-dark); }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      width: 180px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
    }

    tr:last-child th, tr:last-child td { border-bottom: 0; }

    .error, .message {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 600;
    }

    .error { background: var(--danger-bg); color: var(--danger); }
    .message { background: var(--success-bg); color: var(--success); }
    .muted { color: var(--muted); }

    @media (max-width: 720px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      nav { flex-wrap: wrap; border-radius: 18px; }
      .card { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">V</div>
        <div>Daily Vulns Agent</div>
      </div>
      {% if request.session.get("authenticated") %}
      <nav>
        <a href="{{ admin_prefix }}/">仪表盘</a>
        <a href="{{ admin_prefix }}/schedule">调度配置</a>
        <a href="{{ admin_prefix }}/settings/site">站点配置</a>
        <a href="{{ admin_prefix }}/settings/dingtalk">钉钉配置</a>
        <a href="{{ admin_prefix }}/settings/agents">Agent 配置</a>
        <a href="{{ admin_prefix }}/logout">退出</a>
      </nav>
      {% endif %}
    </header>
    <main class="card">
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      {% if message %}<p class="message">{{ message }}</p>{% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
